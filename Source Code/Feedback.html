                <div class="label">
                    <div class="zz">
                        <h3>SEND FEEDBACK</h3>
                    </div>
                </div>
                

                <div class="container">
                    <div class="form">
                        <div class="form-group" required>
                            <input
                                type="text"
                                class="form-control"
                                id="name"
                                placeholder="Account Number"
                                autocomplete="off"
                            />
                        </div>
                        <div class="form-group" required>
                            <input
                                type="email"
                                class="form-control"
                                id="email"
                                placeholder="Email"
                                autocomplete="off"
                            />
                        </div>
                        <div class="form-group" required>
                            <textarea class="form-control" id="message" placeholder="How can we help you?" rows="8"></textarea>
                        </div>
                        <button class="btn btn-primary" onclick="sendMail()">SUBMIT</button>
                    </div>
                </div>
            </div>
        </section>
